<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>d612 — admin</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  :root {
    --bg: #eaeeee;
    --surface: #f4f6f6;
    --surface-2: #ecf0f0;
    --text: #2a2c2c;
    --text-muted: #6a6e6e;
    --text-faint: #9aa0a0;
    --border: #cdd2d2;
    --accent: #2a2c2c;
    --danger: #a64b4b;
    --font: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }
  .sidebar {
    border-right: 0.5px solid var(--border);
    padding: 1.5rem 1.25rem;
    overflow-y: auto;
  }
  .brand { font-size: 1.1rem; margin: 0 0 1.5rem; font-weight: 500; }
  .section { margin-bottom: 1.75rem; }
  .section-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 0.5rem;
  }
  .section-title {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-muted); margin: 0;
  }
  .new-btn {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font: inherit; padding: 0; font-size: 0.875rem;
  }
  .new-btn:hover { color: var(--text); }
  .item-list { list-style: none; margin: 0; padding: 0; }
  .item {
    padding: 0.35rem 0.5rem; border-radius: 4px; cursor: pointer;
    font-size: 0.875rem; color: var(--text);
  }
  .item:hover { background: var(--surface); }
  .item.active { background: var(--surface); font-weight: 500; }
  .item .meta {
    font-size: 0.75rem; color: var(--text-muted);
    display: block; margin-top: 0.1rem;
  }
  .main { padding: 2rem 2.5rem; overflow-y: auto; }
  .empty-state { color: var(--text-muted); margin-top: 4rem; text-align: center; }
  h2 { font-size: 1.25rem; font-weight: 500; margin: 0 0 1.5rem; }
  .field { margin-bottom: 1rem; }
  .field label {
    display: block; font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.3rem;
  }
  input[type="text"], input[type="number"], input[type="date"], textarea {
    width: 100%; padding: 0.5rem 0.625rem; font: inherit;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 4px; color: var(--text);
  }
  input:focus, textarea:focus { outline: none; border-color: var(--text); }
  textarea { resize: vertical; min-height: 5rem; }
  .row { display: grid; grid-template-columns: 1fr 120px 80px; gap: 0.75rem; }
  .row.row-2 { grid-template-columns: 1fr 120px; }

  .photos-section {
    margin-top: 2rem; border-top: 0.5px solid var(--border); padding-top: 1.5rem;
  }
  .photos-subsection { margin-top: 1.5rem; }
  .photos-subsection-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 0.5rem;
    padding-top: 1rem; border-top: 0.5px dashed var(--border);
  }
  .photos-subsection-head:first-child { padding-top: 0; border-top: none; }
  .photos-subsection-title {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-muted); margin: 0;
  }
  .drop-zone {
    display: block;
    border: 1.5px dashed var(--border); border-radius: 6px;
    padding: 2rem; text-align: center; color: var(--text-muted);
    cursor: pointer; transition: border-color 120ms, background 120ms;
    margin-bottom: 1.5rem;
  }
  .drop-zone.drag-over { border-color: var(--text); background: var(--surface); }
  .drop-zone input[type="file"] {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    opacity: 0;
  }
  .photo-list {
    list-style: none; margin: 0; padding: 0;
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .photo-row {
    display: grid; gap: 0.875rem; align-items: start;
    padding: 0.75rem; background: var(--surface);
    border: 0.5px solid var(--border); border-radius: 6px;
    grid-template-columns: 24px 110px 1fr auto;
  }
  .photo-row.candidate { background: var(--surface-2); }
  .photo-row.no-handle { grid-template-columns: 110px 1fr auto; }
  .drag-handle {
    cursor: grab; color: var(--text-faint); user-select: none;
    padding-top: 0.5rem; text-align: center;
  }
  .drag-handle:hover { color: var(--text-muted); }
  .photo-row.sortable-ghost { opacity: 0.4; }
  .photo-thumb {
    width: 110px; height: 110px; object-fit: cover;
    background: var(--bg); border-radius: 4px;
  }
  .photo-fields { display: flex; flex-direction: column; gap: 0.4rem; min-width: 0; }
  .photo-fields input { padding: 0.35rem 0.5rem; }
  .photo-fields .filename {
    font-size: 0.75rem; color: var(--text-muted);
    margin: 0; font-family: monospace; cursor: pointer;
    padding: 0.15rem 0.3rem; margin-left: -0.3rem;
    border-radius: 3px; transition: background 120ms;
    align-self: flex-start;
  }
  .photo-fields .filename:hover { background: var(--bg); color: var(--text); }
  .photo-fields .filename::after {
    content: ' ✎'; font-family: var(--font);
    opacity: 0; transition: opacity 120ms; font-size: 0.7rem;
  }
  .photo-fields .filename:hover::after { opacity: 0.6; }
  .exif-meta {
    margin: 0;
    padding: 0 0.3rem;
    font-size: 0.72rem;
    color: var(--text-faint);
    line-height: 1.3;
  }
  .filename-edit {
    font: inherit; font-size: 0.75rem; font-family: monospace;
    padding: 0.2rem 0.3rem !important; width: auto !important;
    background: white !important; border: 0.5px solid var(--text) !important;
    align-self: flex-start;
  }
  .photo-actions { display: flex; flex-direction: column; gap: 0.3rem; }
  .icon-btn {
    background: none; border: none; color: var(--text-faint);
    cursor: pointer; font: inherit; padding: 0.25rem 0.4rem;
    font-size: 0.95rem; border-radius: 3px; line-height: 1;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.danger:hover { color: var(--danger); }
  .small-btn {
    background: none; border: 0.5px solid var(--border); color: var(--text-muted);
    cursor: pointer; font: inherit; padding: 0.35rem 0.7rem;
    font-size: 0.8125rem; border-radius: 4px; line-height: 1.2;
    white-space: nowrap;
  }
  .small-btn:hover { color: var(--text); border-color: var(--text); }
  .small-btn.danger:hover { color: var(--danger); border-color: var(--danger); }

  .actions {
    margin-top: 2rem; display: flex; gap: 0.75rem; align-items: center;
    padding-top: 1.5rem; border-top: 0.5px solid var(--border);
  }
  .btn {
    padding: 0.625rem 1.25rem; font: inherit;
    background: var(--accent); color: white; border: none;
    border-radius: 4px; cursor: pointer;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { background: var(--border); cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--text); border: 0.5px solid var(--border); }
  .btn-danger { background: var(--danger); color: white; }

  .danger-zone {
    margin-top: 3rem; padding-top: 1.5rem;
    border-top: 0.5px solid var(--border);
  }
  .danger-zone-title {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--danger); margin: 0 0 0.5rem;
  }
  .danger-zone-desc { color: var(--text-muted); margin: 0 0 0.75rem; font-size: 0.8125rem; }

  .status { color: var(--text-muted); font-size: 0.875rem; }
  .status.error { color: var(--danger); }
  .status.success { color: #2c7a4f; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1 class="brand">d612 — admin <span style="font-size: 0.65rem; font-weight: 400; color: var(--text-faint);">build 2026-07-08b</span></h1>

    <div class="section">
      <div class="section-head">
        <h2 class="section-title">Monthly</h2>
        <button class="new-btn" id="new-monthly">+ new</button>
      </div>
      <ul class="item-list" id="monthly-list"></ul>
    </div>

    <div class="section">
      <div class="section-head">
        <h2 class="section-title">Works</h2>
        <button class="new-btn" id="new-works">+ new</button>
      </div>
      <ul class="item-list" id="works-list"></ul>
    </div>
  </aside>

  <main class="main" id="main">
    <p class="empty-state">Select an entry on the left, or create a new one.</p>
  </main>
</div>

<script>
const state = {
  works: [],
  monthly: [],
  current: null,
};

async function api(path, opts = {}) {
  const res = await fetch(path, opts);
  if (!res.ok) {
    const text = await res.text();
    try { throw new Error(JSON.parse(text).error || text); }
    catch { throw new Error(text); }
  }
  return res.json();
}
function apiJson(path, method, body) {
  return api(path, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
}

async function loadState() {
  const s = await api('/api/state');
  state.works = s.works;
  state.monthly = s.monthly;
  renderSidebar();
}

function renderSidebar() {
  const mEl = document.getElementById('monthly-list');
  mEl.innerHTML = '';
  for (const m of state.monthly) {
    const li = document.createElement('li');
    li.className = 'item' + (state.current?.section === 'monthly' && state.current?.slug === m.slug ? ' active' : '');
    li.innerHTML = `${m.slug}<span class="meta">${m.caption ?? ''}</span>`;
    li.onclick = () => loadEntry('monthly', m.slug);
    mEl.appendChild(li);
  }

  const wEl = document.getElementById('works-list');
  wEl.innerHTML = '';
  for (const s of state.works) {
    const li = document.createElement('li');
    li.className = 'item' + (state.current?.section === 'works' && state.current?.slug === s.slug ? ' active' : '');
    li.innerHTML = `${s.title}<span class="meta">${s.slug} · ${s.photoCount} photo${s.photoCount === 1 ? '' : 's'}</span>`;
    li.onclick = () => loadEntry('works', s.slug);
    wEl.appendChild(li);
  }
}

async function loadEntry(section, slug) {
  const entry = await api(`/api/entry/${section}/${slug}`);
  state.current = { section, slug, ...entry, isNew: false };
  renderMain();
  renderSidebar();
}

async function refreshEntry() {
  if (!state.current || state.current.isNew) return;
  const { section, slug, data, content } = state.current;
  const fresh = await api(`/api/entry/${section}/${slug}`);
  // Keep unsaved local data, just refresh originals + candidates list
  state.current.originals = fresh.originals;
  state.current.candidates = fresh.candidates;
  renderPhotoList();
  renderUntracked();
  renderCandidates();
}

function newMonthly() {
  const today = new Date().toISOString().slice(0, 10);
  const slug = today.slice(0, 7);
  state.current = {
    section: 'monthly',
    slug,
    data: { date: today, photo: `./${slug}.jpg`, caption: '' },
    content: '',
    originals: [],
    candidates: [],
    isNew: true,
  };
  renderMain();
  renderSidebar();
}

function newWorks() {
  const order = (Math.max(0, ...state.works.map((s) => s.order ?? 0)) || 0) + 1;
  state.current = {
    section: 'works',
    slug: '',
    data: { title: '', year: new Date().getFullYear(), order, intro: '', photos: [] },
    content: '',
    originals: [],
    candidates: [],
    isNew: true,
  };
  renderMain();
  renderSidebar();
}

function renderMain() {
  const el = document.getElementById('main');
  el.innerHTML = '';
  if (!state.current) {
    el.innerHTML = '<p class="empty-state">Select an entry on the left, or create a new one.</p>';
    return;
  }
  if (state.current.section === 'monthly') renderMonthlyForm(el, state.current);
  else renderWorksForm(el, state.current);
}

function renderMonthlyForm(el, c) {
  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <h2>${c.isNew ? 'New monthly entry' : `Edit ${c.slug}`}</h2>

    <div class="row row-2">
      <div class="field">
        <label>Date</label>
        <input type="date" id="f-date" value="${c.data.date ? new Date(c.data.date).toISOString().slice(0,10) : ''}" />
      </div>
      <div class="field">
        <label>Slug (auto from date)</label>
        <input type="text" id="f-slug" value="${c.slug}" ${c.isNew ? '' : 'readonly'} />
      </div>
    </div>

    <div class="field">
      <label>Title (e.g. "Raining forest")</label>
      <input type="text" id="f-caption" value="${escapeAttr(c.data.caption ?? '')}" />
    </div>

    <div class="field">
      <label>Note (markdown — appears below date)</label>
      <textarea id="f-content" rows="5">${escapeHtml(c.content ?? '')}</textarea>
    </div>

    <div class="photos-section">
      <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">Photo</label>
      <label class="drop-zone" id="drop-zone" for="file-input">
        <input type="file" accept="image/jpeg,image/jpg" id="file-input" />
        <span>${c.data.photo && !c.isNew ? `Current: <code>${c.data.photo}</code> — drop to replace` : 'Drop a JPEG here, or click to select'}</span>
      </label>
    </div>

    <div class="actions">
      <button class="btn" id="publish-btn">Publish to d612.space</button>
      <span class="status" id="status"></span>
    </div>
  `;
  el.appendChild(wrap);

  document.getElementById('f-date').oninput = (e) => {
    c.data.date = e.target.value;
    const slug = e.target.value.slice(0, 7);
    c.slug = slug;
    c.data.photo = `./${slug}.jpg`;
    document.getElementById('f-slug').value = slug;
  };
  document.getElementById('f-caption').oninput = (e) => {
    c.data.caption = e.target.value || undefined;
  };
  document.getElementById('f-content').oninput = (e) => { c.content = e.target.value; };

  bindDropZone(uploadMonthlyPhoto);
  document.getElementById('publish-btn').onclick = publish;
}

function renderWorksForm(el, c) {
  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <h2>${c.isNew ? 'New series' : `Edit ${c.slug}`}</h2>

    <div class="row">
      <div class="field">
        <label>Title</label>
        <input type="text" id="f-title" value="${escapeAttr(c.data.title ?? '')}" />
      </div>
      <div class="field">
        <label>Year</label>
        <input type="number" id="f-year" value="${c.data.year ?? new Date().getFullYear()}" />
      </div>
      <div class="field">
        <label>Order</label>
        <input type="number" id="f-order" value="${c.data.order ?? 1}" />
      </div>
    </div>

    <div class="field">
      <label>Slug (lowercase, kebab-case — becomes part of URL)</label>
      <input type="text" id="f-slug" value="${c.slug}" ${c.isNew ? '' : 'readonly'} placeholder="e.g. 04-some-series" />
    </div>

    <div class="field">
      <label>Intro (one sentence under the series title — optional)</label>
      <input type="text" id="f-intro" value="${escapeAttr(c.data.intro ?? '')}" />
    </div>

    <div class="photos-section">
      <div class="photos-subsection-head" style="border-top: none; padding-top: 0;">
        <h3 class="photos-subsection-title">Photos in series <span style="color: var(--text-faint);">· drag handle to reorder, click filename to rename</span></h3>
        <span class="status" style="font-size: 0.75rem;" id="in-series-count">${(c.data.photos ?? []).length}</span>
      </div>

      <label class="drop-zone" id="drop-zone" for="file-input">
        <input type="file" accept="image/jpeg,image/jpg" id="file-input" multiple />
        <span>Drop JPEGs here, or click to select</span>
      </label>

      <ul class="photo-list" id="photo-list"></ul>

      <div id="untracked-section"></div>
      <div id="candidates-section"></div>
    </div>

    <div class="actions">
      <button class="btn" id="publish-btn">Publish to d612.space</button>
      <button class="btn btn-secondary" id="refresh-btn">Refresh from disk</button>
      <span class="status" id="status"></span>
    </div>

    ${c.isNew ? '' : `
    <div class="danger-zone">
      <p class="danger-zone-title">Danger zone</p>
      <p class="danger-zone-desc">Removes the series from the site and git repo. Originals are moved to <code>originals/_archive/works/${c.slug}/</code> so you can restore later by moving the folder back.</p>
      <button class="btn btn-danger" id="delete-series-btn">Delete this series</button>
    </div>
    `}
  `;
  el.appendChild(wrap);

  document.getElementById('f-title').oninput = (e) => {
    c.data.title = e.target.value;
    if (c.isNew && !c.slug) {
      const slug = `${String(c.data.order ?? 1).padStart(2, '0')}-${slugify(e.target.value)}`;
      c.slug = slug;
      document.getElementById('f-slug').value = slug;
    }
  };
  document.getElementById('f-year').oninput = (e) => { c.data.year = Number(e.target.value); };
  document.getElementById('f-order').oninput = (e) => { c.data.order = Number(e.target.value); };
  document.getElementById('f-slug').oninput = (e) => { if (c.isNew) c.slug = e.target.value; };
  document.getElementById('f-intro').oninput = (e) => { c.data.intro = e.target.value || undefined; };

  renderPhotoList();
  renderUntracked();
  renderCandidates();
  bindDropZone(uploadWorksPhotos);

  initSortable();

  document.getElementById('publish-btn').onclick = publish;
  document.getElementById('refresh-btn').onclick = async () => {
    if (c.isNew) {
      setStatus('Save first by publishing — then disk scan works.', 'error');
      return;
    }
    setStatus('Reading disk…');
    await refreshEntry();
    setStatus('Refreshed.', 'success');
  };
  const delBtn = document.getElementById('delete-series-btn');
  if (delBtn) delBtn.onclick = deleteSeries;
}

function initSortable() {
  const list = document.getElementById('photo-list');
  if (!list) return;
  Sortable.get(list)?.destroy();
  Sortable.create(list, {
    handle: '.drag-handle',
    animation: 150,
    ghostClass: 'sortable-ghost',
    onEnd: (e) => {
      if (e.oldIndex === e.newIndex) return;
      const photos = state.current.data.photos;
      const [moved] = photos.splice(e.oldIndex, 1);
      photos.splice(e.newIndex, 0, moved);
    },
  });
}

function renderPhotoList() {
  const c = state.current;
  const list = document.getElementById('photo-list');
  if (!list) return;
  const count = (c.data.photos ?? []).length;
  const countEl = document.getElementById('in-series-count');
  if (countEl) countEl.textContent = String(count);

  list.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const p = c.data.photos[i];
    const filename = p.src.split('/').pop();
    const li = document.createElement('li');
    li.className = 'photo-row';
    li.innerHTML = `
      <div class="drag-handle" title="Drag to reorder">⋮⋮</div>
      <img class="photo-thumb" src="/thumb/works/${c.slug}/${filename}?t=${Date.now()}" loading="lazy" />
      <div class="photo-fields">
        <p class="filename" data-filename="${filename}" data-idx="${i}" title="Click to rename">${filename}</p>
        <input type="text" placeholder="Title (optional)" value="${escapeAttr(p.title ?? '')}" data-field="title" data-idx="${i}" />
        <input type="text" placeholder="Caption (optional)" value="${escapeAttr(p.caption ?? '')}" data-field="caption" data-idx="${i}" />
      </div>
      <div class="photo-actions">
        <button class="icon-btn" data-action="demote" data-idx="${i}" title="Move to candidates (remove from series)">⤓</button>
        <button class="icon-btn danger" data-action="remove" data-idx="${i}" title="Remove from series (file stays)">×</button>
      </div>
    `;
    list.appendChild(li);
  }

  list.querySelectorAll('input[data-field]').forEach((inp) => {
    inp.oninput = (e) => {
      const i = Number(e.target.dataset.idx);
      c.data.photos[i][e.target.dataset.field] = e.target.value || undefined;
    };
  });

  list.querySelectorAll('.filename').forEach((el) => {
    el.onclick = (e) => startRename(e.target);
  });

  list.querySelectorAll('button[data-action]').forEach((btn) => {
    btn.onclick = (e) => {
      const i = Number(e.target.dataset.idx);
      const action = e.target.dataset.action;
      const filename = c.data.photos[i].src.split('/').pop();
      if (action === 'remove') {
        if (!confirm('Remove from series? File stays on disk.')) return;
        c.data.photos.splice(i, 1);
        renderPhotoList();
        renderUntracked();
      } else if (action === 'demote') {
        moveToCandidates(filename, i);
      }
    };
  });

  initSortable();
  loadExifForVisible(list, c.slug);
}

// Lazy-fetch EXIF for each photo row and inject a small line under the filename.
async function loadExifForVisible(root, slug) {
  const rows = root.querySelectorAll('.filename[data-filename]');
  for (const el of rows) {
    if (el.dataset.exifLoaded) continue;
    el.dataset.exifLoaded = '1';
    const filename = el.dataset.filename;
    const stage = el.dataset.stage;
    const subpath = stage === 'candidates' ? `_candidates/${filename}` : filename;
    try {
      const r = await fetch(`/api/exif/works/${slug}/${encodeURIComponent(subpath)}`);
      if (!r.ok) continue;
      const { datetime, city } = await r.json();
      const bits = [];
      if (datetime) bits.push(formatExifDate(datetime));
      if (city) bits.push(city);
      if (bits.length === 0) continue;
      const meta = document.createElement('p');
      meta.className = 'exif-meta';
      meta.textContent = bits.join(' · ');
      el.after(meta);
    } catch {
      // silent — EXIF is best-effort
    }
  }
}

function formatExifDate(dt) {
  const d = new Date(dt);
  if (isNaN(d.getTime())) return String(dt);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function renderUntracked() {
  const c = state.current;
  const el = document.getElementById('untracked-section');
  if (!el || !c || c.section !== 'works') return;

  const inMd = new Set(
    (c.data.photos ?? []).map((p) => p.src.split('/').pop().toLowerCase()),
  );
  const untracked = (c.originals ?? []).filter((f) => {
    const lower = f.toLowerCase().replace(/\.jpeg$/, '.jpg');
    return !inMd.has(lower);
  });

  if (untracked.length === 0) {
    el.innerHTML = '';
    return;
  }

  el.innerHTML = `
    <div class="photos-subsection">
      <div class="photos-subsection-head">
        <h3 class="photos-subsection-title">In folder, not in series — ${untracked.length}</h3>
        <button class="new-btn" id="add-all-btn">+ add all to series</button>
      </div>
      <ul class="photo-list">
        ${untracked.map((f) => `
          <li class="photo-row no-handle">
            <img class="photo-thumb" src="/thumb/works/${c.slug}/${f}?t=${Date.now()}" loading="lazy" />
            <div class="photo-fields">
              <p class="filename" data-filename="${f}" data-stage="untracked" title="Click to rename">${f}</p>
            </div>
            <div class="photo-actions">
              <button class="small-btn" data-add="${f}">+ add</button>
              <button class="small-btn" data-demote="${f}">→ candidates</button>
            </div>
          </li>
        `).join('')}
      </ul>
    </div>
  `;

  const addToSeries = (filename) => {
    const cleanName = filename.replace(/\.(jpe?g)$/i, '.jpg');
    c.data.photos = c.data.photos ?? [];
    c.data.photos.push({ src: `./${c.slug}/${cleanName}` });
  };

  el.querySelectorAll('button[data-add]').forEach((btn) => {
    btn.onclick = (e) => {
      addToSeries(e.target.dataset.add);
      renderPhotoList();
      renderUntracked();
    };
  });

  el.querySelectorAll('button[data-demote]').forEach((btn) => {
    btn.onclick = (e) => moveToCandidates(e.target.dataset.demote);
  });

  el.querySelectorAll('.filename').forEach((node) => {
    node.onclick = (e) => startRename(e.target);
  });

  document.getElementById('add-all-btn').onclick = () => {
    untracked.forEach(addToSeries);
    renderPhotoList();
    renderUntracked();
  };

  loadExifForVisible(el, c.slug);
}

function renderCandidates() {
  const c = state.current;
  const el = document.getElementById('candidates-section');
  if (!el || !c || c.section !== 'works') return;

  const candidates = c.candidates ?? [];
  if (candidates.length === 0) {
    el.innerHTML = '';
    return;
  }

  el.innerHTML = `
    <div class="photos-subsection">
      <div class="photos-subsection-head">
        <h3 class="photos-subsection-title">Candidates (in _candidates/) — ${candidates.length}</h3>
      </div>
      <ul class="photo-list">
        ${candidates.map((f) => `
          <li class="photo-row no-handle candidate">
            <img class="photo-thumb" src="/thumb/works/${c.slug}/_candidates/${f}?t=${Date.now()}" loading="lazy" />
            <div class="photo-fields">
              <p class="filename" data-filename="${f}" data-stage="candidates">${f}</p>
            </div>
            <div class="photo-actions">
              <button class="small-btn" data-promote="${f}">+ add to series</button>
              <button class="small-btn danger" data-archive-cand="${f}" title="Move to originals/_archive/">archive</button>
            </div>
          </li>
        `).join('')}
      </ul>
    </div>
  `;

  el.querySelectorAll('button[data-promote]').forEach((btn) => {
    btn.onclick = (e) => promoteFromCandidates(e.target.dataset.promote);
  });

  el.querySelectorAll('button[data-archive-cand]').forEach((btn) => {
    btn.onclick = (e) => archiveCandidate(e.target.dataset.archiveCand);
  });

  loadExifForVisible(el, c.slug);
}

// ---------- file actions ----------

async function moveToCandidates(filename, indexInSeries) {
  const c = state.current;
  setStatus(`Moving ${filename} to candidates…`);
  try {
    await apiJson('/api/move-file', 'POST', {
      section: 'works', slug: c.slug, filename, to: 'candidates',
    });
    // If it was in series, remove from .md
    if (typeof indexInSeries === 'number') {
      c.data.photos.splice(indexInSeries, 1);
    }
    await refreshEntry();
    setStatus('Moved to candidates.', 'success');
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

async function promoteFromCandidates(filename) {
  const c = state.current;
  setStatus(`Promoting ${filename}…`);
  try {
    await apiJson('/api/move-file', 'POST', {
      section: 'works', slug: c.slug, filename, to: 'series',
    });
    const cleanName = filename.replace(/\.(jpe?g)$/i, '.jpg');
    c.data.photos = c.data.photos ?? [];
    c.data.photos.push({ src: `./${c.slug}/${cleanName}` });
    await refreshEntry();
    setStatus('Added to series.', 'success');
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

async function archiveCandidate(filename) {
  if (!confirm(`Archive ${filename}?\n\nMoves the file to originals/_archive/works/${state.current.slug}/. Restorable by moving the file back.`)) return;
  const c = state.current;
  setStatus(`Archiving ${filename}…`);
  try {
    const r = await apiJson('/api/archive-photo', 'POST', {
      section: 'works', slug: c.slug, filename, from: 'candidates',
    });
    await refreshEntry();
    setStatus(`Archived → ${r.archivedTo}`, 'success');
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

async function deleteSeries() {
  const c = state.current;
  if (!confirm(`Delete series "${c.data.title}"?\n\nRemoves it from the site and git. Originals move to originals/_archive/works/${c.slug}/ — restorable by moving the folder back.`)) return;
  setStatus('Deleting series…');
  try {
    const result = await api(`/api/series/${c.slug}`, { method: 'DELETE' });
    const archiveMsg = result.archivedTo ? ` Originals archived → ${result.archivedTo}` : '';
    setStatus('Series deleted.' + archiveMsg, 'success');
    state.current = null;
    await loadState();
    renderMain();
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

function startRename(el) {
  const c = state.current;
  const oldName = el.dataset.filename || el.textContent;
  const stage = el.dataset.stage; // 'untracked' or undefined (in series)
  const input = document.createElement('input');
  input.type = 'text';
  input.value = oldName;
  input.className = 'filename-edit';

  let done = false;
  const cancel = () => {
    if (done) return;
    done = true;
    input.replaceWith(el);
  };

  const save = async () => {
    if (done) return;
    done = true;
    const newName = input.value.trim();
    if (!newName || newName === oldName) {
      input.replaceWith(el);
      return;
    }
    try {
      const result = await apiJson('/api/rename-file', 'POST', {
        section: 'works',
        slug: c.slug,
        oldName,
        newName,
      });
      // Update local state — server already updated .md on disk
      if (c.section === 'works' && Array.isArray(c.data.photos)) {
        for (const p of c.data.photos) {
          if (p.src.endsWith('/' + oldName)) {
            p.src = p.src.replace(oldName, result.newName);
          }
        }
      }
      await refreshEntry();
      setStatus(`Renamed ${oldName} → ${result.newName}`, 'success');
    } catch (e) {
      setStatus('Rename failed: ' + e.message, 'error');
      input.replaceWith(el);
    }
  };

  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); save(); }
    if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  };
  input.onblur = save;

  el.replaceWith(input);
  input.focus();
  input.select();
}

// ---------- upload ----------

function bindDropZone(uploadFn) {
  const zone = document.getElementById('drop-zone');
  const input = document.getElementById('file-input');
  if (!zone || !input) return;

  // Native <label for="file-input"> opens the picker on click — no JS click
  // handler needed. Adding one caused a synthetic click loop with the label's
  // native activation that swallowed the resulting change event.
  input.onchange = () => {
    if (input.files.length) uploadFn([...input.files]);
    input.value = '';
  };

  const stop = (e) => { e.preventDefault(); e.stopPropagation(); };
  zone.addEventListener('dragenter', (e) => { stop(e); zone.classList.add('drag-over'); });
  zone.addEventListener('dragover', (e) => { stop(e); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', (e) => { stop(e); zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', (e) => {
    stop(e);
    zone.classList.remove('drag-over');
    const all = [...(e.dataTransfer?.files ?? [])];
    const files = all.filter((f) => /\.(jpe?g)$/i.test(f.name));
    if (!files.length) {
      setStatus(all.length ? `Drop JPEG files only (got ${all.length} non-JPEG).` : 'No files detected in drop.', 'error');
      return;
    }
    uploadFn(files);
  });
}

async function uploadMonthlyPhoto(files) {
  const c = state.current;
  if (!c.slug) { setStatus('Set date first', 'error'); return; }
  if (files.length === 0) return;
  const file = files[0];
  const renamed = new File([file], `${c.slug}.jpg`, { type: file.type });
  const fd = new FormData();
  fd.append('section', 'monthly');
  fd.append('slug', c.slug);
  fd.append('photos', renamed);
  setStatus('Uploading…');
  try {
    await api('/api/upload', { method: 'POST', body: fd });
    setStatus(`Uploaded ${renamed.name}. Publish to push to d612.space.`, 'success');
    const zoneSpan = document.querySelector('#drop-zone span');
    if (zoneSpan) zoneSpan.textContent = `Uploaded: ${renamed.name} — drop again to replace`;
  } catch (e) {
    setStatus('Upload failed: ' + e.message, 'error');
  }
}

async function uploadWorksPhotos(files) {
  const c = state.current;
  if (!c.slug) { setStatus('Set slug first', 'error'); return; }
  if (files.length === 0) return;
  const fd = new FormData();
  fd.append('section', 'works');
  fd.append('slug', c.slug);
  for (const f of files) fd.append('photos', f);
  setStatus(`Uploading ${files.length} file${files.length === 1 ? '' : 's'}…`);
  try {
    const { filenames } = await api('/api/upload', { method: 'POST', body: fd });
    c.data.photos = c.data.photos ?? [];
    for (const fn of filenames) {
      const cleanName = fn.replace(/\.(JPE?G)$/i, '.jpg');
      c.data.photos.push({ src: `./${c.slug}/${cleanName}` });
    }
    await refreshEntry();
    setStatus(`Uploaded ${filenames.length} — added to series. Publish to push.`, 'success');
  } catch (e) {
    setStatus('Upload failed: ' + e.message, 'error');
  }
}

// ---------- publish ----------

async function publish() {
  const c = state.current;
  const btn = document.getElementById('publish-btn');
  btn.disabled = true;
  setStatus('Processing photos and pushing…');
  try {
    await apiJson('/api/publish', 'POST', {
      section: c.section,
      slug: c.slug,
      data: c.data,
      content: c.content,
    });
    setStatus('✓ Pushed. Vercel will deploy in ~1 min.', 'success');
    c.isNew = false;
    await loadState();
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ---------- utils ----------

function setStatus(text, kind = '') {
  const el = document.getElementById('status');
  if (!el) return;
  el.textContent = text;
  el.className = 'status ' + kind;
}
function escapeAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
function escapeHtml(s) { return String(s).replace(/</g, '&lt;'); }
function slugify(s) {
  return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

document.getElementById('new-monthly').onclick = newMonthly;
document.getElementById('new-works').onclick = newWorks;

// Prevent the browser from opening a dropped file if it lands outside a drop zone.
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('drop', (e) => e.preventDefault());

loadState();
</script>
